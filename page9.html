<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <title>C Programming Presentation - Closing & QA</title>
    <script src="https://picture-search.skywork.ai/aippt/static/tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');

        body {
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f8fafc;
        }

        .summary-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.08);
        }

        html {
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-slate-50 flex items-center justify-center">
    <div class="relative w-full h-screen flex flex-col justify-center items-center p-24" style="overflow: hidden;">

        <div class="text-center mb-16">
            <h1 class="text-7xl font-black text-slate-900 mb-6 tracking-tight">발표 마무리 및 질의응답</h1>
            <div class="flex justify-center items-center gap-6">
                <div class="h-1.5 w-16 bg-emerald-700"></div>
                <p class="text-emerald-800 text-2xl font-semibold tracking-widest uppercase">Closing & Questions</p>
                <div class="h-1.5 w-16 bg-emerald-700"></div>
            </div>
        </div>

        <div class="summary-card w-full max-w-5xl p-16 mb-20 text-center border-b-[12px] border-emerald-800">
            <div class="flex justify-center mb-8 text-emerald-700 text-5xl">
                <i class="fas fa-terminal"></i>
            </div>
            <p class="text-4xl font-bold text-slate-800 leading-tight">
                "C언어는 컴퓨터 과학의 근간을 이루며,<br>
                오늘날 다양한 IT 분야에서 <span class="text-emerald-700 underline underline-offset-8">핵심적인 역할</span>을 수행합니다."
            </p>
            <div class="mt-12 pt-10 border-t border-slate-100 flex justify-center gap-16">
                <div class="flex items-center gap-3">
                    <i class="fas fa-check-circle text-emerald-600 text-2xl"></i>
                    <span class="text-slate-600 font-bold text-2xl">강력한 성능</span>
                </div>
                <div class="flex items-center gap-3">
                    <i class="fas fa-check-circle text-emerald-600 text-2xl"></i>
                    <span class="text-slate-600 font-bold text-2xl">높은 이식성</span>
                </div>
                <div class="flex items-center gap-3">
                    <i class="fas fa-check-circle text-emerald-600 text-2xl"></i>
                    <span class="text-slate-600 font-bold text-2xl">시스템 제어</span>
                </div>
            </div>
        </div>

        <div class="w-full flex justify-between items-center max-w-5xl px-4">
            <div class="flex items-center gap-10">
                <div
                    class="w-28 h-28 bg-slate-900 text-white rounded-full flex items-center justify-center text-5xl shadow-lg">
                    <i class="fas fa-question"></i>
                </div>
                <div>
                    <h3 class="text-5xl font-black text-slate-900 italic mb-2 tracking-tighter">ANY QUESTIONS?</h3>
                    <p class="text-slate-500 text-2xl">내용이나 팀 <span class="font-bold text-emerald-800">'반대표와
                            아이들'</span>에게 질문해 주세요.</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-3xl font-bold text-slate-800 mb-3">경청해 주셔서 감사합니다.</p>
                <div class="flex justify-end gap-3 text-emerald-700 font-extrabold italic tracking-tighter text-2xl">
                    <span>김도윤</span>
                    <span>김준영</span>
                    <span>이윤호</span>
                    <span>장원준</span>
                </div>
            </div>
        </div>

        <div class="absolute bottom-10 right-10 opacity-5 pointer-events-none">
            <span class="text-9xl font-black tracking-tighter select-none">THANK YOU</span>
        </div>
    </div>

    <script src="./src/concat.js"></script>
</body>

</html>
