<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C언어 EXPRESS — 반대표와 아이들</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      background: #0f172a;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    /* ───── HUB (랜딩) ───── */
    #hub {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 24px;
      gap: 48px;
    }

    .hub-header {
      text-align: center;
    }

    .hub-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      color: #60a5fa;
      background: rgba(96, 165, 250, .1);
      border: 1px solid rgba(96, 165, 250, .25);
      border-radius: 99px;
      padding: 4px 14px;
      margin-bottom: 16px;
    }

    .hub-title {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.15;
      background: linear-gradient(135deg, #fff 40%, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hub-sub {
      margin-top: 10px;
      font-size: 14px;
      color: rgba(255, 255, 255, .4);
      letter-spacing: .04em;
    }

    /* ───── 챕터 카드 그리드 ───── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 16px;
      padding: 28px 24px;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .2s;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(96, 165, 250, .08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .25s;
    }

    .card:hover {
      background: rgba(255, 255, 255, .07);
      border-color: rgba(96, 165, 250, .4);
      transform: translateY(-3px);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      color: #60a5fa;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      color: #f1f5f9;
    }

    .card-desc {
      font-size: 12.5px;
      color: rgba(255, 255, 255, .35);
      line-height: 1.6;
    }

    .card-arrow {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(96, 165, 250, .6);
      align-self: flex-end;
      transition: color .2s, transform .2s;
    }

    .card:hover .card-arrow {
      color: #60a5fa;
      transform: translateX(4px);
    }

    /* ───── VIEWER ───── */
    #viewer-wrap {
      display: none;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: rgba(15, 23, 42, .88);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
      transition: opacity .4s;
    }

    #topbar.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #backBtn {
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 6px;
      color: rgba(255, 255, 255, .5);
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
      transition: background .2s, color .2s;
    }

    #backBtn:hover {
      background: rgba(255, 255, 255, .14);
      color: #fff;
    }

    .topbar-title {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, .5);
      letter-spacing: .06em;
    }

    .topbar-title span {
      color: #60a5fa;
    }

    .topbar-hint {
      font-size: 11px;
      color: rgba(255, 255, 255, .3);
      letter-spacing: .04em;
    }

    #fsBtn {
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 6px;
      color: rgba(255, 255, 255, .5);
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
      transition: background .2s, color .2s;
    }

    #fsBtn:hover {
      background: rgba(255, 255, 255, .15);
      color: #fff;
    }

    iframe {
      width: 100vw;
      height: calc(100vh - 36px);
      margin-top: 36px;
      border: none;
      display: block;
      transition: margin-top .4s ease, height .4s ease;
    }

    iframe.topbar-hidden {
      margin-top: 0;
      height: 100vh;
    }
  </style>
</head>

<body>

  <!-- ── 허브 ── -->
  <div id="hub">
    <div class="hub-header">
      <div class="hub-badge">C언어 EXPRESS</div>
      <div class="hub-title">반대표와 아이들</div>
      <div class="hub-sub">챕터를 선택하여 슬라이드를 시작하세요</div>
    </div>

    <div class="card-grid" id="cardGrid">
      <!-- 카드는 JS로 생성 -->
    </div>
  </div>

  <!-- ── 뷰어 ── -->
  <div id="viewer-wrap">
    <div id="topbar">
      <div class="topbar-left">
        <button id="backBtn" onclick="goHub()">← 목록</button>
        <div class="topbar-title" id="topbarTitle">C언어 EXPRESS · <span id="topbarChapter">Chapter 01</span> — 반대표와 아이들
        </div>
      </div>
      <div class="topbar-hint">← → 화살표 키 또는 슬라이드 하단 버튼으로 이동</div>
      <button id="fsBtn" onclick="toggleFullscreen()">⛶ 전체화면</button>
    </div>

    <iframe id="slideFrame" src="" allowfullscreen></iframe>
  </div>

  <script>
    // ── 챕터 목록 (여기에 챕터 추가하면 됨) ──
    const chapters = [
      {
        id: 'chapter1',
        num: 'CHAPTER 01',
        title: 'C언어 프로그래밍의\n기초와 핵심',
        desc: '변수, 자료형, 입출력, 조건문, 반복문 등 C언어의 핵심 개념을 다룹니다.',
        file: 'slides/chapter1_slides.html'
      },
      {
        id: 'chapter2',
        num: 'CHAPTER 02',
        title: '프로그래밍 언어와\nC언어의 세계',
        desc: '기계어, 어셈블리어, 고급언어의 특징과 C언어의 역사에 대해 알아봅니다.',
        file: 'slides/chapter2_slides.html'
      },
      {
        id: 'chapter3',
        num: 'CHAPTER 03',
        title: '제어문 활용 —\nswitch문 계산기',
        desc: 'switch문을 활용한 사칙연산 계산기 구현과 예외 처리를 다룹니다.',
        file: 'slides/chapter3_slides.html'
      },
      {
        id: 'chapter4',
        num: 'CHAPTER 04',
        title: '기초 입출력과 수식 —\n원의 넓이와 둘레',
        desc: '기초 입출력과 수식을 활용하여 원의 넓이와 둘레를 계산하는 프로그램을 다룹니다.',
        file: 'slides/chapter4_slides.html'
      },
      {
        id: 'chapter5',
        num: 'CHAPTER 05',
        title: '기초 입출력과 수식 —\n성적 평균 계산',
        desc: 'float 자료형과 실수 나눗셈을 활용하여 세 과목 성적 평균을 계산하는 프로그램을 다룹니다.',
        file: 'slides/chapter5_slides.html'
      }
    ];

    // ── 카드 렌더링 ──
    const grid = document.getElementById('cardGrid');
    chapters.forEach(ch => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-num">${ch.num}</div>
        <div class="card-title">${ch.title.replace('\n', '<br>')}</div>
        <div class="card-desc">${ch.desc}</div>
        <div class="card-arrow">슬라이드 열기 →</div>
      `;
      card.onclick = () => openChapter(ch);
      grid.appendChild(card);
    });

    // ── 챕터 열기 ──
    function openChapter(ch) {
      document.getElementById('topbarChapter').textContent = ch.num;
      document.getElementById('slideFrame').src = ch.file;
      document.getElementById('hub').style.display = 'none';
      document.getElementById('viewer-wrap').style.display = 'block';
      location.hash = ch.id;
    }

    // ── 허브로 돌아가기 ──
    function goHub() {
      document.getElementById('viewer-wrap').style.display = 'none';
      document.getElementById('hub').style.display = 'flex';
      document.getElementById('slideFrame').src = '';
      location.hash = '';
      document.getElementById('fsBtn').textContent = '⛶ 전체화면';
    }

    // ── URL 해시로 직접 진입 ──
    const hash = location.hash.replace('#', '');
    if (hash) {
      const ch = chapters.find(c => c.id === hash);
      if (ch) openChapter(ch);
    }

    // ── 상단 바 자동 숨김 ──
    const topbar = document.getElementById('topbar');
    const slideFrame = document.getElementById('slideFrame');
    let hideTimer;
    document.addEventListener('mousemove', () => {
      topbar.classList.remove('hidden');
      slideFrame.classList.remove('topbar-hidden');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        topbar.classList.add('hidden');
        slideFrame.classList.add('topbar-hidden');
      }, 3000);
    });

    // ── 전체화면 ──
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.getElementById('fsBtn').textContent = '✕ 전체화면 종료';
      } else {
        document.exitFullscreen();
        document.getElementById('fsBtn').textContent = '⛶ 전체화면';
      }
    }

    // ── 키보드 이벤트 iframe 전달 ──
    document.addEventListener('keydown', (e) => {
      if (!slideFrame.src) return;
      try {
        slideFrame.contentWindow.dispatchEvent(new KeyboardEvent('keydown', {
          key: e.key, bubbles: true
        }));
      } catch (err) { }
    });
  </script>
</body>

</html>
