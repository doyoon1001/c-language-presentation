<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>C언어 팀플 발표 자료</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: white;
            opacity: 0.3;
            transition: 0.3s;
        }

        .controls:hover {
            opacity: 1;
        }

        /* index.html의 style 태그 안에 추가 */
        #viewer {
            transition: opacity 0.3s ease-in-out;
            background-color: white;
        }
    </style>
</head>

<body>
    <iframe id="viewer" src="slides/page1.html"></iframe>

    <div class="controls">
        <span id="pageInfo">1 / 9</span> | ← → 화살표 키로 이동
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 9;
        const viewer = document.getElementById('viewer');
        const pageInfo = document.getElementById('pageInfo');

        function updateSlide() {
            viewer.src = `slides/page${currentSlide}.html`;
            pageInfo.innerText = `${currentSlide} / ${totalSlides}`;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                if (currentSlide < totalSlides) currentSlide++;
                updateSlide();
            } else if (e.key === 'ArrowLeft') {
                if (currentSlide > 1) currentSlide--;
                updateSlide();
            }
        });
    </script>
</body>

</html>
